<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e"/>

  <!-- Crab claw - flat silhouette, centered for favicon -->
  <g transform="translate(256,270)" fill="#e84430">
    <!-- Left arm -->
    <path d="M-15,-12 C-30,-60 -65,-110 -100,-140
             C-112,-150 -130,-152 -135,-135
             C-138,-122 -128,-105 -110,-88
             L-58,-30 Z"/>
    <!-- Left pincher - top finger -->
    <path d="M-100,-140 C-112,-168 -140,-198 -158,-196
             C-172,-193 -172,-178 -160,-164
             C-145,-147 -116,-138 -100,-140 Z"/>
    <!-- Left pincher - bottom finger -->
    <path d="M-100,-140 C-128,-134 -162,-140 -168,-126
             C-172,-114 -158,-106 -138,-110
             C-118,-116 -104,-130 -100,-140 Z"/>

    <!-- Right arm (mirrored) -->
    <path d="M15,-12 C30,-60 65,-110 100,-140
             C112,-150 130,-152 135,-135
             C138,-122 128,-105 110,-88
             L58,-30 Z"/>
    <!-- Right pincher - top finger -->
    <path d="M100,-140 C112,-168 140,-198 158,-196
             C172,-193 172,-178 160,-164
             C145,-147 116,-138 100,-140 Z"/>
    <!-- Right pincher - bottom finger -->
    <path d="M100,-140 C128,-134 162,-140 168,-126
             C172,-114 158,-106 138,-110
             C118,-116 104,-130 100,-140 Z"/>

    <!-- Body -->
    <ellipse cx="0" cy="0" rx="35" ry="24"/>
  </g>
</svg>
